  expansion_tile_card: ^3.0.0
  open_file: ^3.3.0
  file_picker: ^10.3.7 # Updated
  image_picker: ^1.0.0 # Updated
  grouped_list: ^6.0.0
  accordion: ^2.6.0

  timetable: 1.0.0-alpha.15
  local_notifier: ^0.1.6

  debug_overlay: ^1.0.0
  flutter_localization: ^0.3.3 # Updated
  dropdown_search: ^6.0.2
  card_swiper: ^3.0.1
  galleryimage: ^2.0.1

  time_range_picker: ^2.2.0
  time: ^2.1.3
  black_hole_flutter: ^1.0.0
  collection: ^1.18.0
  #  git:
  #    url: https://github.com/mtoman1985/flutter_time_range_picker

  syncfusion_flutter_datagrid: ^31.2.12 # Updated
  flutter_expandable_fab: ^2.2.0
  pluto_grid: ^8.0.0
  animated_tree_view: ^2.2.0
  pdf: ^3.11.0 # Updated
  photo_view: ^0.15.0 # Updated
  table_calendar: ^3.1.0 # Updated
  cached_network_image: ^3.4.0 # Updated - fixes DecoderCallback error
  win32: ^5.5.0 # Updated - fixes UnmodifiableUint8ListView error
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.5.41
  sqlite3: ^3.1.2
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1
  path: ^1.9.0
dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Updated

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/db/
    - assets/icon/
    - assets/accounting/
    - assets/fonts/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Amiri
      fonts:
        - asset: assets/fonts/ArbFONTS-Amiri.ttf
          weight: 400
        - asset: assets/fonts/ArbFONTS-Amiri-Bold.ttf
          weight: 700

